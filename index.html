<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>癮酒 — 今天想喝什麼?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --night:#0E1219;
    --night-2:#161C26;
    --surface:#1B222E;
    --amber:#E7A64C;
    --amber-soft:#F0BE74;
    --cream:#F1EBDE;
    --muted:#8E897B;
    --line:rgba(231,166,76,0.22);
    --serif-disp:"Cormorant Garamond","Noto Serif TC",serif;
    --serif-tc:"Noto Serif TC",serif;
    --sans:"Noto Sans TC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--night);
    color:var(--cream);
    font-family:var(--sans);
    font-weight:300;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  /* warm ambient light pooled at top, like a backbar bulb */
  #app{
    position:relative;
    width:100%;max-width:440px;height:100vh;max-height:920px;
    background:radial-gradient(120% 70% at 50% -8%, #2A2030 0%, #141A24 46%, var(--night) 100%);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  #glow{
    position:absolute;top:-180px;left:50%;transform:translateX(-50%);
    width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle, rgba(231,166,76,0.30) 0%, rgba(231,166,76,0.06) 45%, transparent 70%);
    filter:blur(6px);pointer-events:none;transition:background 1.2s ease;
  }
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    padding:clamp(28px,7vw,44px) clamp(24px,6vw,34px);}
  .hidden{display:none !important;}

  /* ---------- intro ---------- */
  #intro{justify-content:center;align-items:center;text-align:center;}
  .brand-mark{font-family:var(--serif-disp);font-size:13px;letter-spacing:.5em;
    color:var(--amber);text-transform:uppercase;margin-bottom:30px;opacity:0;padding-left:.5em;}
  .brand-title{font-family:var(--serif-tc);font-weight:500;font-size:clamp(58px,17vw,78px);
    line-height:1;color:var(--cream);letter-spacing:.06em;opacity:0;}
  .brand-sub{font-family:var(--serif-disp);font-style:italic;font-size:22px;
    color:var(--amber-soft);margin-top:18px;opacity:0;}
  .intro-glass{margin:38px 0 30px;opacity:0;}
  .intro-line{font-size:13px;color:var(--muted);line-height:2;letter-spacing:.05em;
    max-width:260px;margin-bottom:36px;opacity:0;}
  .btn{
    font-family:var(--sans);font-weight:400;font-size:15px;letter-spacing:.25em;
    color:var(--night);background:var(--amber);
    border:none;border-radius:2px;padding:16px 46px;cursor:pointer;
    transition:transform .15s ease, background .25s ease;padding-left:calc(.25em + 46px);
  }
  .btn:hover{background:var(--amber-soft);}
  .btn:active{transform:scale(.97);}
  .btn-ghost{
    background:transparent;color:var(--amber);border:1px solid var(--line);
  }
  .btn-ghost:hover{background:rgba(231,166,76,0.08);color:var(--amber-soft);}

  /* ---------- quiz ---------- */
  #quiz{justify-content:space-between;}
  .q-top{display:flex;align-items:center;justify-content:space-between;}
  .step-dots{display:flex;gap:7px;}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(241,235,222,0.18);transition:background .4s,width .4s;}
  .dot.on{background:var(--amber);width:18px;border-radius:3px;}
  .step-eyebrow{font-family:var(--serif-disp);font-style:italic;font-size:15px;color:var(--muted);}
  .q-mid{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;justify-content:center;}
  .scene-motif{margin-bottom:26px;height:84px;display:flex;align-items:center;justify-content:center;}
  .scene-motif svg{width:84px;height:84px;}
  .q-text{font-family:var(--serif-tc);font-weight:500;font-size:clamp(23px,6.2vw,28px);
    line-height:1.55;color:var(--cream);max-width:300px;}
  .q-choices{display:flex;flex-direction:column;gap:11px;padding-bottom:6px;}
  .choice{
    font-family:var(--sans);font-weight:300;font-size:16px;color:var(--cream);
    text-align:left;background:rgba(241,235,222,0.04);
    border:1px solid rgba(241,235,222,0.10);border-radius:3px;
    padding:17px 20px;cursor:pointer;letter-spacing:.02em;
    transition:background .22s,border-color .22s,transform .12s,color .22s;
  }
  .choice:hover{background:rgba(231,166,76,0.10);border-color:var(--line);color:#fff;}
  .choice:active{transform:scale(.99);}

  /* ---------- result ---------- */
  #result{justify-content:flex-start;align-items:center;text-align:center;overflow-y:auto;}
  #result::-webkit-scrollbar{display:none;}
  .res-eyebrow{font-family:var(--serif-disp);font-style:italic;font-size:16px;
    color:var(--muted);margin-top:6px;opacity:0;}
  .res-glass{margin:6px 0 2px;opacity:0;}
  .res-tag{display:inline-block;font-size:11px;letter-spacing:.35em;color:var(--amber);
    border:1px solid var(--line);border-radius:2px;padding:7px 16px 7px 19px;margin-bottom:14px;opacity:0;}
  .res-name{font-family:var(--serif-tc);font-weight:600;font-size:clamp(30px,8vw,38px);
    color:var(--cream);line-height:1.2;opacity:0;}
  .res-en{font-family:var(--serif-disp);font-style:italic;font-size:18px;
    color:var(--amber-soft);margin-top:4px;margin-bottom:18px;opacity:0;}
  .res-desc{font-size:14px;color:#C9C3B5;line-height:2;max-width:300px;margin-bottom:24px;opacity:0;letter-spacing:.02em;}
  .res-match{font-size:13px;letter-spacing:.18em;color:var(--amber);margin-bottom:18px;opacity:0;}
  .res-match b{font-family:var(--serif-disp);font-style:italic;font-size:20px;font-weight:600;letter-spacing:0;}
  .spectrum-block{width:100%;max-width:320px;opacity:0;}
  .bars-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .bars-head::before,.bars-head::after{content:"";flex:1;height:1px;background:var(--line);}
  .bars-head span{font-size:11px;letter-spacing:.3em;color:var(--muted);white-space:nowrap;}
  .spec-row{border-bottom:1px solid rgba(241,235,222,0.06);padding:13px 2px;cursor:pointer;}
  .spec-head{display:flex;align-items:baseline;gap:10px;}
  .spec-name{font-family:var(--serif-tc);font-weight:500;font-size:16px;color:var(--cream);}
  .spec-en{font-family:var(--serif-disp);font-style:italic;font-size:13px;color:var(--muted);flex:1;}
  .spec-pct{font-family:var(--serif-disp);font-size:20px;font-weight:600;color:var(--amber-soft);}
  .spec-track{height:4px;border-radius:2px;background:rgba(241,235,222,0.08);margin-top:9px;overflow:hidden;}
  .spec-fill{height:100%;width:0;border-radius:2px;}
  .spec-note{font-size:12.5px;line-height:1.9;color:#A8A293;letter-spacing:.02em;
    max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .35s ease,margin .4s ease;}
  .spec-row.open .spec-note{max-height:120px;opacity:1;margin-top:11px;}
  .spec-chevron{font-size:11px;color:var(--muted);transition:transform .3s ease;}
  .spec-row.open .spec-chevron{transform:rotate(90deg);}
  .res-actions{display:flex;gap:10px;margin:24px 0 30px;opacity:0;}
  .res-actions .btn{padding:14px 24px;font-size:13px;letter-spacing:.18em;}
  .footer-note{font-size:10px;color:rgba(142,137,123,0.6);letter-spacing:.18em;padding-bottom:18px;}
  .glass-svg{filter:drop-shadow(0 6px 24px rgba(0,0,0,0.5));}
</style>
</head>
<body>
<div id="app">
  <div id="glow"></div>

  <!-- ============ INTRO ============ -->
  <section id="intro" class="screen">
    <div class="brand-mark">N I G H T C A P</div>
    <h1 class="brand-title">癮酒</h1>
    <div class="brand-sub">今天想喝什麼?</div>
    <div class="intro-glass">
      <svg width="120" height="150" viewBox="0 0 120 150" class="glass-svg" aria-hidden="true">
        <defs>
          <clipPath id="introClip"><path d="M34 44 L86 44 L80 122 Q80 128 74 128 L46 128 Q40 128 40 122 Z"/></clipPath>
        </defs>
        <g clip-path="url(#introClip)">
          <rect id="introLiquid" x="30" y="128" width="60" height="90" fill="#C8821E" opacity="0.9"/>
        </g>
        <path d="M34 44 L86 44 L80 122 Q80 128 74 128 L46 128 Q40 128 40 122 Z" fill="none" stroke="rgba(241,235,222,0.55)" stroke-width="1.4"/>
        <ellipse cx="60" cy="44" rx="26" ry="4.5" fill="none" stroke="rgba(241,235,222,0.55)" stroke-width="1.4"/>
        <rect x="52" y="62" width="20" height="20" rx="3" fill="none" stroke="rgba(241,235,222,0.28)" stroke-width="1.1" transform="rotate(-8 62 72)"/>
      </svg>
    </div>
    <p class="intro-line">說幾個選擇,走一段短短的夜路。<br>路的盡頭,有一杯只屬於你的酒。</p>
    <button class="btn" id="startBtn">開 始</button>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="quiz" class="screen hidden">
    <div class="q-top">
      <div class="step-dots" id="dots"></div>
      <div class="step-eyebrow" id="eyebrow"></div>
    </div>
    <div class="q-mid">
      <div class="scene-motif" id="motif"></div>
      <h2 class="q-text" id="qText"></h2>
    </div>
    <div class="q-choices" id="choices"></div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="result" class="screen hidden">
    <div class="res-eyebrow" id="resEyebrow">你的夜,屬於——</div>
    <div class="res-glass">
      <svg width="150" height="186" viewBox="0 0 150 186" class="glass-svg" aria-hidden="true">
        <defs>
          <clipPath id="resClip"><path d="M40 50 L110 50 L102 150 Q102 158 94 158 L56 158 Q48 158 48 150 Z"/></clipPath>
        </defs>
        <g clip-path="url(#resClip)">
          <rect id="resLiquid" x="34" y="158" width="82" height="120" fill="#C8821E"/>
          <path id="resWave" d="M30 0 Q50 -7 75 0 T150 0 L150 30 L30 30 Z" fill="rgba(255,255,255,0.10)"/>
        </g>
        <path d="M40 50 L110 50 L102 150 Q102 158 94 158 L56 158 Q48 158 48 150 Z" fill="none" stroke="rgba(241,235,222,0.6)" stroke-width="1.5"/>
        <ellipse cx="75" cy="50" rx="35" ry="6" fill="none" stroke="rgba(241,235,222,0.6)" stroke-width="1.5"/>
        <rect x="62" y="74" width="26" height="26" rx="4" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.2" transform="rotate(-8 75 87)"/>
      </svg>
    </div>
    <div class="res-tag" id="resTag"></div>
    <h2 class="res-name" id="resName"></h2>
    <div class="res-en" id="resEn"></div>
    <div class="res-match" id="resMatch"></div>
    <p class="res-desc" id="resDesc"></p>

    <div class="spectrum-block" id="spectrumBlock">
      <div class="bars-head"><span>你也很適合這幾杯</span></div>
      <div id="spectrum"></div>
    </div>

    <div class="res-actions">
      <button class="btn btn-ghost" id="shareBtn">分享結果</button>
      <button class="btn btn-ghost" id="againBtn">再走一次</button>
    </div>
    <div class="footer-note" id="venueFoot">◯◯ BAR · 選酒測驗</div>
  </section>
</div>

<script>
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- scene motifs (elegant amber line art) ---------- */
const MOTIF = {
  door:`<svg viewBox="0 0 84 84" fill="none" stroke="#E7A64C" stroke-width="1.4" stroke-linecap="round"><path d="M26 72 V20 Q42 8 58 20 V72"/><path d="M26 72 H58"/><circle cx="51" cy="46" r="1.6" fill="#E7A64C" stroke="none"/><path d="M18 72 H66" stroke-width="1"/></svg>`,
  meet:`<svg viewBox="0 0 84 84" fill="none" stroke="#E7A64C" stroke-width="1.4" stroke-linecap="round"><circle cx="32" cy="32" r="8"/><path d="M20 64 q0-16 12-16 t12 16"/><circle cx="56" cy="36" r="7" opacity="0.55"/><path d="M46 64 q0-14 10-14 t10 14" opacity="0.55"/></svg>`,
  spark:`<svg viewBox="0 0 84 84" fill="none" stroke="#E7A64C" stroke-width="1.4" stroke-linecap="round"><path d="M42 22 C30 30 30 46 42 58 C54 46 54 30 42 22 Z"/><path d="M42 58 v8"/><path d="M28 40 l-7 2 M56 40 l7 2" opacity="0.6"/></svg>`,
  path:`<svg viewBox="0 0 84 84" fill="none" stroke="#E7A64C" stroke-width="1.4" stroke-linecap="round"><path d="M42 70 C42 56 28 52 28 38 C28 26 36 22 42 22"/><path d="M42 50 C42 42 54 40 58 30" opacity="0.6"/><circle cx="42" cy="22" r="2.4" fill="#E7A64C" stroke="none"/></svg>`
};

/* ---------- quiz model ----------
   每個選項用 w 餵分給多杯酒(這是讓「每杯獨立 %」成立的關鍵:
   一個選擇會同時提高好幾杯的契合度,而不是只對應一杯)。*/
const STEPS = [
  { eyebrow:"i. 出發", motif:"door", q:"推開那扇門,夜在外面等你。你的腳步先走向——",
    choices:[
      {t:"走進森林,讓綠意把聲音都吸走", w:{pinot:3, neg:1, old:1}},
      {t:"奔向海邊,迎著風與浪聲", w:{spritz:3, marg:1}},
      {t:"往山上去,想把世界看得更遠", w:{old:3, pinot:1, neg:1}},
      {t:"鑽進城市,霓虹與人潮裡", w:{marg:3, spritz:1, neg:1}},
    ]},
  { eyebrow:"ii. 相遇", motif:"meet", q:"走著走著,你遇見一個人。你希望對方是——",
    choices:[
      {t:"一位老朋友,什麼都不必說也自在", w:{pinot:3, old:1}},
      {t:"一個陌生人,眼神裡藏著故事", w:{neg:3, old:1, pinot:1}},
      {t:"一群旅人,笑著招手要你同行", w:{marg:3, spritz:2}},
    ]},
  { eyebrow:"iii. 心動", motif:"spark", q:"這一刻,你心裡最想做的事是——",
    choices:[
      {t:"坐下來,把這片風景慢慢看完", w:{pinot:3, old:1, neg:1}},
      {t:"拍一張照,把當下收進口袋", w:{spritz:3, marg:1}},
      {t:"往更深處走,看看還藏著什麼", w:{old:3, neg:2}},
    ]},
  { eyebrow:"iv. 試煉", motif:"path", q:"前方有一道關卡。對你而言,最難跨過的是——",
    choices:[
      {t:"天色暗下來,前路看不分明", w:{neg:3, old:1}},
      {t:"岔路太多,不知該選哪一條", w:{old:3, neg:1, pinot:1}},
      {t:"走到最後,只剩自己一個人", w:{pinot:3, neg:1}},
    ]},
];

/* 這是「某一間酒吧」自家酒單。每杯酒會各自累積契合度 %,
   最後取前三名:第一名注入酒杯,二三名做成可展開的光譜條。
   酒吧要客製,只需改這份 DRINKS 與下方各選項的 w 權重。*/
const DRINKS = {
  pinot:{ name:"黑皮諾", en:"Pinot Noir", tag:"內 斂 的 沉 思 者", color:"#7A2330",
    desc:"你走的是一條向內的路,懂得獨處,也享受安靜的深度。一杯溫潤而層次細膩的紅酒,陪你把夜慢慢收尾。",
    note:"莓果與森林氣息,單寧柔和。本店選用勃艮第小農款,適合一個人靜靜啜飲。" },
  spritz:{ name:"亞普羅氣泡", en:"Aperol Spritz", tag:"明 亮 的 享 樂 者", color:"#E8623C",
    desc:"你的夜明亮而輕盈,不愛沉重,只想無負擔地享受當下。橙色的氣泡帶著微苦的甜,正是你的節奏。",
    note:"亞普羅、氣泡酒與一片柳橙,清爽帶微苦。本店加了自製柑橘糖漿,當晚的第一杯首選。" },
  old:{ name:"古典", en:"Old Fashioned", tag:"深 沉 的 鑑 賞 者", color:"#C8821E",
    desc:"你總想走得更遠、看得更深,不滿足於表面。一杯濃烈而有層次的威士忌,值得你花時間慢慢品。",
    note:"波本、糖與一抹苦精,化在大冰球上。本店可換成單一麥芽,熟客的深夜定番。" },
  marg:{ name:"瑪格麗特", en:"Margarita", tag:"熱 烈 的 點 火 者", color:"#9FB13C",
    desc:"有你的地方就有熱鬧,你被光與人群吸引,越喧囂越自在。一杯酸甜帶勁的龍舌蘭,為好心情乾杯。",
    note:"龍舌蘭、萊姆與鹽口,酸甜俐落。本店用煙燻龍舌蘭,後勁帶一點火氣。" },
  neg:{ name:"尼格羅尼", en:"Negroni", tag:"複 雜 的 個 性 派", color:"#A33417",
    desc:"你被未知與故事吸引,欣賞複雜,也不怕苦澀。一杯苦甜交織、個性鮮明的調酒,和你一樣有稜有角。",
    note:"琴酒、金巴利與甜苦艾各半,苦甜交織。本店做桶陳版本,風味更深沉。" },
};

/* ---------- elements ---------- */
const intro=document.getElementById('intro'), quiz=document.getElementById('quiz'), result=document.getElementById('result');
const dotsEl=document.getElementById('dots'), eyebrowEl=document.getElementById('eyebrow');
const motifEl=document.getElementById('motif'), qTextEl=document.getElementById('qText'), choicesEl=document.getElementById('choices');
const glow=document.getElementById('glow');

let idx=0;
const scores={pinot:0,spritz:0,old:0,marg:0,neg:0};

/* MBTI 式獨立百分比:先算每杯酒「理論最高分」(每題挑對它最有利的選項)。
   契合度 % = 實得分 / 該杯最高分 → 每杯各自獨立,可以同時很高。*/
const MAXPOSS={};
for(const k in DRINKS){
  let m=0;
  STEPS.forEach(s=>{ let best=0; s.choices.forEach(c=>{ if(c.w[k]>best)best=c.w[k]; }); m+=best; });
  MAXPOSS[k]=m||1;
}

/* dots */
STEPS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);});
function paintDots(){[...dotsEl.children].forEach((d,i)=>d.classList.toggle('on',i===idx));}

/* ---------- intro entrance ---------- */
function playIntro(){
  if(reduce){gsap.set(['.brand-mark','.brand-title','.brand-sub','.intro-glass','.intro-line','#startBtn'],{opacity:1,y:0});return;}
  const tl=gsap.timeline();
  tl.to('#glow',{opacity:1,duration:1.2},0)
    .from('#introLiquid',{attr:{y:128},duration:1.4,ease:"power2.out"},0.2)
    .to('.brand-mark',{opacity:1,duration:1,ease:"power1.out"},0.3)
    .to('.brand-title',{opacity:1,y:0,duration:1.1,ease:"power3.out"},"-=0.6")
    .from('.brand-title',{y:18,duration:1.1,ease:"power3.out"},"<")
    .to('.brand-sub',{opacity:1,duration:0.9},"-=0.5")
    .to('.intro-glass',{opacity:1,duration:0.9},"-=0.6")
    .to('.intro-line',{opacity:1,duration:0.9},"-=0.5")
    .fromTo('#startBtn',{opacity:0,y:14},{opacity:1,y:0,duration:0.8,ease:"power2.out"},"-=0.4");
  gsap.set('#introLiquid',{attr:{y:84}});
}
playIntro();

/* ---------- quiz flow ---------- */
function showStep(){
  const s=STEPS[idx];
  paintDots();
  eyebrowEl.textContent=s.eyebrow;
  motifEl.innerHTML=MOTIF[s.motif];
  qTextEl.textContent=s.q;
  choicesEl.innerHTML='';
  s.choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice';b.textContent=c.t;
    b.addEventListener('click',()=>choose(c));
    choicesEl.appendChild(b);
  });
  if(reduce){gsap.set(['.scene-motif','.q-text','.choice'],{opacity:1,y:0});return;}
  const tl=gsap.timeline();
  tl.fromTo('.scene-motif',{opacity:0,scale:.9},{opacity:1,scale:1,duration:.7,ease:"power2.out"})
    .fromTo('.q-text',{opacity:0,y:16},{opacity:1,y:0,duration:.6,ease:"power2.out"},"-=.4")
    .fromTo('.choice',{opacity:0,y:14},{opacity:1,y:0,duration:.5,stagger:.08,ease:"power2.out"},"-=.3");
  // motif draw-in
  gsap.fromTo(motifEl.querySelectorAll('path,circle,ellipse,rect'),
    {opacity:0},{opacity:1,duration:.6,stagger:.05,delay:.15});
}

function choose(choice){
  for(const k in choice.w){ scores[k]+=choice.w[k]; }
  // 用目前領先那杯酒的顏色染環境光
  let lead='pinot',best=-1;
  for(const k in scores){ const pct=scores[k]/MAXPOSS[k]; if(pct>best){best=pct;lead=k;} }
  const lc=DRINKS[lead].color;
  glow.style.background=`radial-gradient(circle, ${hexA(lc,0.4)} 0%, ${hexA(lc,0.08)} 45%, transparent 70%)`;
  if(reduce){idx++; idx<STEPS.length?showStep():showResult();return;}
  const tl=gsap.timeline();
  tl.to('.scene-motif, .q-text',{opacity:0,y:-14,duration:.35,ease:"power1.in"})
    .to('.choice',{opacity:0,y:-10,duration:.3,stagger:.04,ease:"power1.in"},"-=.3")
    .add(()=>{idx++; idx<STEPS.length?showStep():showResult();});
}

/* hue helper: take a dark hex base and make a glow tint */
function hexA(hex,a){
  const h=hex.replace('#','');const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  // brighten toward amber for glow
  return `rgba(${Math.min(r+90,255)},${Math.min(g+60,255)},${Math.min(b+30,255)},${a})`;
}

document.getElementById('startBtn').addEventListener('click',()=>{
  if(reduce){intro.classList.add('hidden');quiz.classList.remove('hidden');showStep();return;}
  gsap.to(intro,{opacity:0,duration:.5,onComplete:()=>{
    intro.classList.add('hidden');intro.style.opacity=1;
    quiz.classList.remove('hidden');showStep();
  }});
});

/* ---------- result ---------- */
function showResult(){
  // 算出每杯酒的獨立契合度 %,壓進 48–98 區間(像 MBTI,不會出現生硬的 0% 或 100%)
  const ranked = Object.keys(DRINKS).map(k=>({
    k, pct: Math.round(48 + (scores[k]/MAXPOSS[k])*50), d: DRINKS[k]
  })).sort((a,b)=>b.pct-a.pct);

  const top = ranked[0];
  const r = top.d;

  document.getElementById('resTag').textContent=r.tag;
  document.getElementById('resName').textContent=r.name;
  document.getElementById('resEn').textContent=r.en;
  document.getElementById('resMatch').innerHTML=`與你 <b>${top.pct}%</b> 契合`;
  document.getElementById('resDesc').textContent=r.desc;
  document.getElementById('resLiquid').setAttribute('fill',r.color);
  document.getElementById('resWave').setAttribute('fill','rgba(255,255,255,0.12)');

  // 第 2、3 名做成可展開光譜條
  const spec=document.getElementById('spectrum');spec.innerHTML='';
  const rest=ranked.slice(1,3);
  rest.forEach(item=>{
    const row=document.createElement('div');row.className='spec-row';
    row.innerHTML=`
      <div class="spec-head">
        <span class="spec-name">${item.d.name}</span>
        <span class="spec-en">${item.d.en}</span>
        <span class="spec-pct">${item.pct}%</span>
        <span class="spec-chevron">▸</span>
      </div>
      <div class="spec-track"><div class="spec-fill" data-pct="${item.pct}" style="background:${item.d.color}"></div></div>
      <div class="spec-note">${item.d.note}</div>`;
    row.addEventListener('click',()=>row.classList.toggle('open'));
    spec.appendChild(row);
  });

  glow.style.background=`radial-gradient(circle, ${hexA(r.color,0.42)} 0%, ${hexA(r.color,0.10)} 45%, transparent 72%)`;

  quiz.classList.add('hidden');
  result.classList.remove('hidden');

  const fillBars=()=>{
    spec.querySelectorAll('.spec-fill').forEach(f=>{
      const pct=f.getAttribute('data-pct');
      if(reduce){f.style.width=pct+'%';return;}
      gsap.to(f,{width:pct+'%',duration:1,ease:"power2.out",delay:.1});
    });
  };

  if(reduce){
    gsap.set(['.res-eyebrow','.res-glass','.res-tag','.res-name','.res-en','.res-match','.res-desc','.spectrum-block','.res-actions'],{opacity:1,y:0});
    gsap.set('#resLiquid',{attr:{y:60}});fillBars();return;
  }
  gsap.set('#resLiquid',{attr:{y:158}});
  gsap.set('#resWave',{x:0});
  const tl=gsap.timeline();
  tl.to('.res-eyebrow',{opacity:1,duration:.8,ease:"power1.out"},0)
    .to('.res-glass',{opacity:1,duration:.8},0.2)
    // 招牌時刻:酒液注入酒杯
    .to('#resLiquid',{attr:{y:60},duration:1.6,ease:"power2.inOut"},0.4)
    .to('.res-tag',{opacity:1,y:0,duration:.7,ease:"power2.out"},"-=0.7")
    .from('.res-tag',{y:10,duration:.7},"<")
    .to('.res-name',{opacity:1,duration:.8,ease:"power2.out"},"-=0.4")
    .from('.res-name',{y:14,duration:.8},"<")
    .to('.res-en',{opacity:1,duration:.7},"-=0.5")
    .to('.res-match',{opacity:1,duration:.7},"-=0.4")
    .to('.res-desc',{opacity:1,y:0,duration:.8},"-=0.4")
    .from('.res-desc',{y:12,duration:.8},"<")
    .to('.spectrum-block',{opacity:1,y:0,duration:.8},"-=0.3")
    .from('.spectrum-block',{y:16,duration:.8},"<")
    .add(fillBars,"-=0.5")
    .to('.res-actions',{opacity:1,duration:.7},"-=0.3");
  gsap.to('#resWave',{x:-40,duration:3.2,repeat:-1,yoyo:true,ease:"sine.inOut",delay:1.6});
}

document.getElementById('againBtn').addEventListener('click',()=>{
  idx=0;for(const k in scores)scores[k]=0;
  document.getElementById('spectrum').innerHTML='';
  glow.style.background=`radial-gradient(circle, rgba(231,166,76,0.30) 0%, rgba(231,166,76,0.06) 45%, transparent 70%)`;
  result.classList.add('hidden');quiz.classList.remove('hidden');showStep();
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const n=document.getElementById('resName').textContent;
  if(navigator.share){navigator.share({title:'癮酒',text:`我的酒是「${n}」,今天想喝什麼?`}).catch(()=>{});}
  else{document.getElementById('shareBtn').textContent='已複製連結';}
});
</script>
